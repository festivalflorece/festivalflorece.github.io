<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Festival Florece Open Graph Image</title>
  <desc id="desc">A dark, neon-accented festival announcement image with bold modern typography for Festival Florece on April 18, 2026 in Caguas, Puerto Rico.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07050c" />
      <stop offset="100%" stop-color="#0f1120" />
    </linearGradient>
    <radialGradient id="glowGreen" cx="50%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#9cff77" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#9cff77" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowPurple" cx="80%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#d080ff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#d080ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowPink" cx="20%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#ff67c8" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#ff67c8" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)" />
  <circle cx="280" cy="150" r="180" fill="url(#glowGreen)" filter="url(#softGlow)" />
  <circle cx="960" cy="180" r="140" fill="url(#glowPink)" filter="url(#softGlow)" />
  <circle cx="820" cy="470" r="200" fill="url(#glowPurple)" filter="url(#softGlow)" />

  <path d="M180 440 C 340 360, 540 460, 700 390 S 980 500, 1060 420" fill="none" stroke="#6bffdf" stroke-width="4" stroke-linecap="round" opacity="0.42" />
  <path d="M200 520 C 360 460, 520 540, 700 500 S 980 580, 1040 520" fill="none" stroke="#f670d4" stroke-width="3" stroke-linecap="round" opacity="0.28" />

  <g filter="url(#softGlow)">
    <circle cx="540" cy="330" r="12" fill="#6bffdf" />
    <circle cx="630" cy="220" r="10" fill="#f770ff" />
    <circle cx="380" cy="260" r="9" fill="#a0ff7d" />
  </g>

  <rect x="90" y="120" width="1020" height="390" rx="32" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" />

  <text x="110" y="220" fill="#ffffff" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" letter-spacing="-2">Festival</text>
  <text x="110" y="320" fill="#ffffff" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" letter-spacing="-2">Florece</text>

  <text x="110" y="420" fill="#9cff77" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700" letter-spacing="0.18em" text-transform="uppercase">April 18, 2026</text>
  <text x="110" y="470" fill="#cfa4ff" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="600">Caguas, Puerto Rico</text>

  <rect x="110" y="500" width="250" height="3" rx="1.5" fill="#9cff77" opacity="0.9" />
  <rect x="110" y="520" width="180" height="3" rx="1.5" fill="#d080ff" opacity="0.8" />

  <text x="880" y="560" fill="#8f98a9" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" text-anchor="end">Premium music + culture showcase</text>
</svg>
